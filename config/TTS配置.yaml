# TTS服务配置

## 服务提供商

### 可选提供商
- aws：AWS Polly
- azure：Azure TTS
- baidu：百度语音合成
- aliyun：阿里云语音合成

## 基础配置

提供商: aws
服务区域: us-west-2
API密钥: your-api-key-here

## 语音参数

音色: zh-CN-XiaoxiaoNeural
语速: 1.0
音量: 1.0
音高: 0
语言: zh-CN

## 音频格式

格式: mp3
采样率: 22050
编码质量: high

## 缓存配置

启用缓存: true
缓存路径: materials/预生成音频
最大缓存数量: 1000
缓存有效期: 30  # 天数

## 重试配置

最大重试次数: 3
重试间隔: 2  # 秒
超时: 10  # 秒

## 降级策略

降级到本地: false
本地音频目录: materials/备用音频
备用音色: 默认

## 调试配置

启用调试: false
日志路径: logs/tts
详细日志: false

## 支持的音色列表

### AWS Polly (中文)
- zh-CN-XiaoxiaoNeural：标准女声
- zh-CN-YunjianNeural：标准男声
- zh-CN-YunxiNeural：年轻女声
- zh-CN-YunxiaNeural：中年女声
- zh-CN-YunyangNeural：中年男声

### Azure TTS (中文)
- zh-CN-XiaoxiaoNeural：年轻女声
- zh-CN-YunfengNeural：中年男声
- zh-CN-YunyangNeural：老年男声
- zh-CN-XiaoqiuNeural：年轻女声
- zh-CN-XiaoyouNeural：年轻女声

### 百度语音合成 (中文)
- 0：度小美（女声）
- 1：度小宇（男声）
- 3：度逍遥（男声）
- 4：度丫丫（女声）
- 5：度小娇（女声）

## 其他选项

启用API参数验证: true
验证模式: strict  # strict/relaxed/off
