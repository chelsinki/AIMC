环节信息:
  名称: 开场介绍
  序号: 1
  预期时长: 60
  预期发言顺序:
    - human
    - ai
    - human
    - ai

主持人台词:
  human_intro:
    文本: "大家好，欢迎来到AI创新大会！"
    预期时长: 3
    关键词:
      - 欢迎
      - AI
    语气: 热情
  ai_response:
    文本: "大家好，我是数字人主持小智，很高兴能和大家一起见证这场科技盛会！"
    预期时长: 6
    关键词:
      - 数字人
      - 科技盛会
    语气: 亲切
    表情: 微笑
  human_continue:
    文本: "是的，今天我们汇聚了很多优秀的AI专家和创业者！"
    预期时长: 4
    关键词:
      - 专家
      - 创业者
    语气: 激动
  ai_close:
    文本: "没错，今天的议程非常精彩。那我们就正式开始吧！"
    预期时长: 5
    关键词:
      - 议程
      - 精彩
    语气: 兴奋
    表情: 兴奋

衔接词库:
  正常衔接:
    - "好的，"
    - "接下来，"
    - "非常好，"
  打断衔接:
    - "抱歉，"
    - "请稍等，"

配置:
  允许即兴: true
  静默判断时长: 2.0
  语音检测阈值: 500
